# Copy to secrets.yaml, fill in values, apply once — NEVER commit secrets.yaml.
#
#   cp deploy/kubernetes/secrets.example.yaml deploy/kubernetes/secrets.yaml
#   # edit secrets.yaml — generate with: openssl rand -hex 32
#   kubectl apply -f deploy/kubernetes/secrets.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: worldmonitor-core
  namespace: worldmonitor
  labels:
    app.kubernetes.io/name: worldmonitor
    app.kubernetes.io/component: core
type: Opaque
stringData:
  REDIS_PASSWORD: "replace-me"
  REDIS_TOKEN: "replace-me"
  RELAY_SHARED_SECRET: "replace-me"
---
# Optional API keys — apply as-is (empty values) or fill in before kubectl apply.
apiVersion: v1
kind: Secret
metadata:
  name: worldmonitor-api-keys
  namespace: worldmonitor
  labels:
    app.kubernetes.io/name: worldmonitor
    app.kubernetes.io/component: api-keys
type: Opaque
stringData:
  GROQ_API_KEY: ""
  OPENROUTER_API_KEY: ""
  AISSTREAM_API_KEY: ""
  FINNHUB_API_KEY: ""
  FRED_API_KEY: ""
  EIA_API_KEY: ""
  NASA_FIRMS_API_KEY: ""
  ACLED_EMAIL: ""
  ACLED_PASSWORD: ""
  ACLED_ACCESS_TOKEN: ""
  CLOUDFLARE_API_TOKEN: ""
  AVIATIONSTACK_API: ""
  TRAVELPAYOUTS_API_TOKEN: ""
  LLM_API_URL: ""
  LLM_API_KEY: ""
  LLM_MODEL: ""
