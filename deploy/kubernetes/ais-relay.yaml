apiVersion: v1
kind: Service
metadata:
  name: ais-relay
  namespace: worldmonitor
  labels:
    app.kubernetes.io/name: ais-relay
    app.kubernetes.io/component: relay
    app.kubernetes.io/part-of: worldmonitor
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3004
      targetPort: http
  selector:
    app.kubernetes.io/name: ais-relay
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ais-relay
  namespace: worldmonitor
  labels:
    app.kubernetes.io/name: ais-relay
    app.kubernetes.io/component: relay
    app.kubernetes.io/part-of: worldmonitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ais-relay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ais-relay
        app.kubernetes.io/component: relay
        app.kubernetes.io/part-of: worldmonitor
    spec:
      containers:
        - name: ais-relay
          image: worldmonitor/ais-relay:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: RELAY_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-core
                  key: RELAY_SHARED_SECRET
            - name: AISSTREAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-api-keys
                  key: AISSTREAM_API_KEY
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
