# OpenShift restricted-v2 compatible security contexts for Node/Alpine workloads.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-rest
spec:
  template:
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis-rest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
---
